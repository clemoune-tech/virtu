---
- name: Installer Nginx
  apt:
    name: nginx
    state: present
    update_cache: true

- name: Déployer la page d'accueil
  template:
    src: index.html.j2
    dest: /var/www/html/index.html
    mode: '0644'
  notify: Reload nginx

- name: Démarrer et activer Nginx
  service:
    name: nginx
    state: started
    enabled: true
# ==========================================================================
# PHP-FPM, PHP MySQL, PHP CLI
# ==========================================================================
- name: "[WEB] Installer PHP-FPM, PHP MySQL et PHP CLI"
  apt:
    name:
      - php-fpm       # Moteur PHP — travaille avec Nginx pour exécuter le PHP
      - php-mysql     # Extension DB — permet à PHP de parler à MariaDB
      - php-cli       # PHP en ligne de commande — scripts, maintenance, cron
    state: present
    update_cache: true

- name: "[WEB] Vérifier la version PHP-FPM installée"
  command: php --version
  register: php_version
  changed_when: false

- name: "[WEB] Afficher la version PHP"
  debug:
    msg: "{{ php_version.stdout_lines[0] }}"

- name: "[WEB] Démarrer et activer PHP-FPM"
  shell: |
    PHP_SERVICE=$(systemctl list-units --type=service | grep php | grep fpm | awk '{print $1}')
    systemctl enable --now $PHP_SERVICE
  changed_when: false