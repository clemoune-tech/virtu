---
# ==========================================================================
# NGINX
# ==========================================================================
- name: "[WEB] Installer Nginx"
  apt:
    name: nginx
    state: present
    update_cache: true

- name: "[WEB] Déployer la page d'accueil"
  template:
    src: index.html.j2
    dest: /var/www/html/index.html
    mode: '0644'
  notify: Reload nginx

- name: "[WEB] Démarrer et activer Nginx"
  service:
    name: nginx
    state: started
    enabled: true

# ==========================================================================
# PHP
# ==========================================================================
- name: "[WEB] Installer PHP-FPM, PHP MySQL et PHP CLI"
  apt:
    name:
      - php-fpm      # Moteur PHP pour Nginx
      - php-mysql    # Connexion PHP → MariaDB
      - php-cli      # PHP en ligne de commande
    state: present
    update_cache: true

- name: "[WEB] Détecter la version PHP installée"
  shell: php -r 'echo PHP_MAJOR_VERSION.".".PHP_MINOR_VERSION;'
  register: php_version
  changed_when: false

- name: "[WEB] Démarrer et activer PHP-FPM"
  service:
    name: "php{{ php_version.stdout }}-fpm"
    state: started
    enabled: true

# ==========================================================================
# NFTABLES — Règles spécifiques au serveur web
# ==========================================================================
- name: "[WEB] Configurer nftables pour le serveur web"
  copy:
    dest: /etc/nftables.conf
    owner: root
    group: root
    mode: '0750'
    content: |
      #!/usr/sbin/nft -f
      flush ruleset
      table inet filter {
          chain input {
              type filter hook input priority filter; policy drop;
              iif "lo" accept
              ct state established,related accept
              ct state invalid drop
              ip protocol icmp accept
              ip6 nexthdr ipv6-icmp accept
              ip saddr 192.168.10.50 tcp dport 22 accept
              tcp dport { 80, 8080 } accept
              ip saddr {{ ip_zabbix_server }} tcp dport 10050 accept
              tcp dport 10051 accept
          }
          chain forward {
              type filter hook forward priority filter; policy drop;
          }
          chain output {
              type filter hook output priority filter; policy accept;
          }
      }
  notify: Restart nftables

- name: "[WEB] Appliquer nftables"
  service:
    name: nftables
    state: restarted