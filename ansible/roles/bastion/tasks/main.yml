# ==========================================================================
# PARTIE 3 : VÉRIFICATION DES COMPTES ET DES CLÉS
# ==========================================================================
- name: "[COMPTES] Créer le groupe des administrateurs (sysadmins)"
  group:
    name: sysadmins
    state: present

- name: "[COMPTES] Créer les comptes utilisateurs des administrateurs"
  user:
    name: "{{ item.name }}"
    group: sysadmins
    shell: /bin/bash
    state: present
  loop: "{{ bastion_admins }}"
  ignore_errors: "{{ ansible_check_mode }}"

- name: "[COMPTES] Déployer les clés SSH pour les administrateurs"
  authorized_key:
    user: "{{ item.name }}"
    state: present
    key: "{{ item.ssh_key }}"
  loop: "{{ bastion_admins }}"

# ==========================================================================
# PARTIE 4 : OUTILS D'ADMINISTRATION COMPLÉMENTAIRES
# ==========================================================================
- name: "[OUTILS] Installer les outils d'administration et de diagnostic"
  apt:
    name:
      - tmux             # Persistance de session
      - nmap             # Scan de ports réseau
      - netcat-openbsd   # Test de connectivité (commande nc)
      - dnsutils         # Résolution de noms (commande dig)
      - htop             # Monitoring des ressources locales
      - git              # Gestion des scripts
    state: present
    update_cache: true

# ==========================================================================
# PARTIE 5 : VÉRIFICATION DES ACCÈS (WEB, DB, VERS LE SERVEUR ZABBIX)
# ==========================================================================
- name: "[RÉSEAU] Vérifier l'accès au serveur Web (Port HTTP)"
  wait_for:
    host: "{{ bastion_ip_web }}"
    port: 80
    timeout: 5

- name: "[RÉSEAU] Vérifier l'accès à la Base de Données"
  wait_for:
    host: "{{ bastion_ip_db }}"
    port: "{{ bastion_port_db }}"
    timeout: 5
  ignore_errors: true 

- name: "[RÉSEAU] Vérifier que le Bastion peut joindre le serveur Zabbix distant (Port 8080)"
  wait_for:
    host: "{{ bastion_zabbix_server }}"
    port: 8080
    timeout: 5
    # ==========================================================================
# PARTIE 6 : CLÉ SSH DU BASTION (pour accéder à web et db)
# ==========================================================================
- name: "[BASTION] Générer la clé SSH du bastion"
  openssh_keypair:
    path: /home/ladmin/.ssh/id_ed25519
    type: ed25519
    owner: ladmin
    group: ladmin
    mode: '0600'
  register: bastion_keypair

- name: "[BASTION] Récupérer la clé publique du bastion"
  fetch:
    src: /home/ladmin/.ssh/id_ed25519.pub
    dest: /tmp/bastion_id_ed25519.pub
    flat: true

# ==========================================================================
# PARTIE 6 : CLÉ SSH DU BASTION (pour accéder à web et db)
# ==========================================================================
- name: "[BASTION] Générer la clé SSH du bastion"
