---
# ==========================================================================
# PARTIE 1 : CONFIGURATION ZABBIX AGENT (installé via cloud-init)
# ==========================================================================
- name: "[ZABBIX] Vérifier que l'agent Zabbix est installé"
  stat:
    path: /etc/zabbix/zabbix_agentd.conf
  register: zabbix_conf
  failed_when: not zabbix_conf.stat.exists
  ignore_errors: "{{ ansible_check_mode }}"

- name: "[SOCLE] Configurer le serveur Zabbix distant (passif)"
  lineinfile:
    path: /etc/zabbix/zabbix_agentd.conf
    regexp: '^Server='
    line: "Server={{ bastion_zabbix_server }}"
  ignore_errors: "{{ ansible_check_mode }}"
  notify: Restart zabbix-agent

- name: "[SOCLE] Configurer le serveur Zabbix distant (actif)"
  lineinfile:
    path: /etc/zabbix/zabbix_agentd.conf
    regexp: '^ServerActive='
    line: "ServerActive={{ bastion_zabbix_server }}"
  ignore_errors: "{{ ansible_check_mode }}"
  notify: Restart zabbix-agent

- name: "[SOCLE] Configurer le hostname de l'agent Zabbix"
  lineinfile:
    path: /etc/zabbix/zabbix_agentd.conf
    regexp: '^Hostname='
    line: 'Hostname={{ inventory_hostname }}'
  notify: Restart zabbix-agent

- name: "[SOCLE] Configurer le fuseau horaire"
  timezone:
    name: Europe/Paris

- name: "[SOCLE] Activer et démarrer l'agent Zabbix"
  service:
    name: zabbix-agent
    state: started
    enabled: true

# ==========================================================================
