---
# ── Système ──────────────────────────────────────────────────────────────────
- name: Mettre à jour le cache APT
  apt:
    update_cache: true
    cache_valid_time: 3600

- name: Installer les paquets de base
  apt:
    name:
      - sudo
      - rsync
      - nftables
      - chrony
    state: present

# ── Zabbix — dépôt + installation ────────────────────────────────────────────
- name: Télécharger le paquet de dépôt Zabbix
  apt:
    deb: https://repo.zabbix.com/zabbix/7.0/debian/pool/main/z/zabbix-release/zabbix-release_latest_7.0+debian13_all.deb
    state: present

- name: Mettre à jour le cache APT après ajout du dépôt Zabbix
  apt:
    update_cache: true

- name: Installer Zabbix agent
  apt:
    name: zabbix-agent
    state: present

- name: Configurer Zabbix Server
  lineinfile:
    path: /etc/zabbix/zabbix_agentd.conf
    regexp: '^Server='
    line: 'Server=192.168.10.51'
  ignore_errors: "{{ ansible_check_mode }}"    # ← AJOUTER
  notify: Restart zabbix-agent

- name: Configurer Zabbix Server Active
  lineinfile:
    path: /etc/zabbix/zabbix_agentd.conf
    regexp: '^ServerActive='
    line: 'ServerActive=192.168.10.51'
  notify: Restart zabbix-agent

- name: Configurer le hostname Zabbix
  lineinfile:
    path: /etc/zabbix/zabbix_agentd.conf
    regexp: '^Hostname='
    line: 'Hostname={{ inventory_hostname }}'
  notify: Restart zabbix-agent

# ── Timezone ──────────────────────────────────────────────────────────────────
- name: Configurer le fuseau horaire
  timezone:
    name: Europe/Paris

# ── Services ──────────────────────────────────────────────────────────────────
- name: Activer et démarrer qemu-guest-agent
  service:
    name: qemu-guest-agent
    state: started
    enabled: true

- name: Activer et démarrer chrony
  service:
    name: chrony
    state: started
    enabled: true

- name: Activer et démarrer fail2ban
  service:
    name: fail2ban
    state: started
    enabled: true

- name: Activer et démarrer nftables
  service:
    name: nftables
    state: started
    enabled: true

- name: Activer et démarrer zabbix-agent
  service:
    name: zabbix-agent
    state: started
    enabled: true

# ── Sécurité SSH ──────────────────────────────────────────────────────────────
- name: Autoriser la connexion par mot de passe SSH
  lineinfile:
    path: /etc/ssh/sshd_config.d/99-workshop.conf
    line: 'PasswordAuthentication yes'
    create: true
    mode: '0644'
  notify: Restart ssh

- name: Interdire l'authentification root par mot de passe
  lineinfile:
    path: /etc/ssh/sshd_config.d/99-workshop.conf
    regexp: '^#?PermitRootLogin'
    line: 'PermitRootLogin prohibit-password'
    create: true
    mode: '0644'
  notify: Restart ssh
  # ==========================================================================
# NFTABLES — Règles de base communes à toutes les VMs
# ==========================================================================
- name: "[SOCLE] Générer les règles nftables de base"
  copy:
    dest: /etc/nftables.conf
    owner: root
    group: root
    mode: '0750'
    content: |
      #!/usr/sbin/nft -f
      flush ruleset
      table inet filter {
          chain input {
              type filter hook input priority filter; policy drop;
              # 1. Trafic local (loopback)
              iif "lo" accept
              # 2. Trafic déjà établi
              ct state established,related accept
              # 3. Trafic invalide
              ct state invalid drop
              # 4. ICMP — diagnostic réseau
              ip protocol icmp accept
              ip6 nexthdr ipv6-icmp accept
              # 5. SSH
              tcp dport 22 accept
              # 6. Zabbix agent
              ip saddr {{ ip_zabbix_server }} tcp dport 8080 accept
          }
          chain forward {
              type filter hook forward priority filter; policy drop;
          }
          chain output {
              type filter hook output priority filter; policy accept;
          }
      }
  notify: Restart nftables

- name: "[SOCLE] Activer et démarrer nftables"
  service:
    name: nftables
    state: started
    enabled: true
    # ── Règles nftables spécifiques au serveur web ────────────────────────────────
- name: "[WEB] Configurer nftables pour le serveur web"
  copy:
    dest: /etc/nftables.conf
    owner: root
    group: root
    mode: '0750'
    content: |
      #!/usr/sbin/nft -f
      flush ruleset
      table inet filter {
          chain input {
              type filter hook input priority filter; policy drop;
              # Loopback
              iif "lo" accept
              # Trafic établi
              ct state established,related accept
              # Trafic invalide
              ct state invalid drop
              # ICMP
              ip protocol icmp accept
              ip6 nexthdr ipv6-icmp accept
              # SSH — depuis le bastion uniquement
              ip saddr 192.168.10.50 tcp dport 22 accept
              # HTTP et Zabbix frontend
              tcp dport { 80, 8080 } accept
              # Zabbix agent
              ip saddr {{ ip_zabbix_server }} tcp dport 10050 accept
              # Zabbix server
              tcp dport 10051 accept
          }
          chain forward {
              type filter hook forward priority filter; policy drop;
          }
          chain output {
              type filter hook output priority filter; policy accept;
          }
      }
  notify: Restart nftables

- name: "[WEB] Appliquer les règles nftables"
  service:
    name: nftables
    state: restarted