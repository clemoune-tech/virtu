#cloud-config
hostname: vm-source
manage_etc_hosts: true

users:
  - name: admin
    groups: [sudo, adm]
    shell: /bin/bash
    sudo: ALL=(ALL) NOPASSWD:ALL
    ssh_authorized_keys:
      - ssh-ed25519 AAAA...votre_cle_publique...

package_update: true
package_upgrade: true

packages:
  - qemu-guest-agent
  - vim
  - curl
  - sudo
  - nftables

runcmd:
  - systemctl enable --now qemu-guest-agent
